version: '3.8'
# ISOLATED — do NOT use —remove-orphans (project scoped to searxng/)
# All federation infra lives in separate compose projects
services:
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - SEARXNG_SECRET=0eb4ed5dc2fcfa6829d9b1991e33d7f1f5726fadf41f4ebb8995d7bc881173f5
      - SEARXNG_BASE_URL=http://localhost:8080
    volumes:
      - ./settings.yml:/etc/searxng/settings.yml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/search?q=test&format=json"]
      interval: 30s
      timeout: 10s
      retries: 3
