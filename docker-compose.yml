version: '3.8'
# ISOLATED — do NOT use —remove-orphans (project scoped to searxng/)
# All federation infra lives in separate compose projects
services:
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - SEARXNG_SECRET=${SEARXNG_SECRET:?SEARXNG_SECRET must be set}
      - SEARXNG_BASE_URL=http://localhost:8080
    volumes:
      - ./settings.yml:/etc/searxng/settings.yml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/search?q=test&format=json"]
      interval: 30s
      timeout: 10s
      retries: 3
